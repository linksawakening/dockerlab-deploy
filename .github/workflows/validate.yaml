name: Validate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate starter compose syntax
        working-directory: docker-git-deploy-skill/assets/starter
        run: docker compose config >/dev/null

      - name: Shell script syntax check
        run: |
          for f in docker-git-deploy-skill/scripts/*; do
            echo "checking $f"
            bash -n "$f"
          done
