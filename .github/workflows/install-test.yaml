name: Install Test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  install-test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Materialize a deployment repo from the bundled starter
        run: |
          mkdir -p /tmp/deploy
          cp -r docker-git-deploy-skill/assets/starter/. /tmp/deploy/
          cd /tmp/deploy
          git init -qb main
          git config user.email ci@example.com
          git config user.name CI
          git add -A
          git commit -qm "init deployment repo"

      - name: Validate the deployment repo is pure config
        working-directory: /tmp/deploy
        run: bash "$GITHUB_WORKSPACE/docker-git-deploy-skill/scripts/validate-repo-structure.sh"

      - name: Run install.sh (default unprivileged user)
        run: |
          sudo bash docker-git-deploy-skill/scripts/install.sh \
            --deployment-repo "file:///tmp/deploy" \
            --deployment-dir /opt/host-deploy \
            --interval 7min

      - name: Assert systemd units were rendered from the flags
        run: |
          echo "--- service ---"; sudo systemctl cat docker-git-deploy.service
          echo "--- timer ---";   sudo systemctl cat docker-git-deploy.timer
          sudo grep -qx 'User=docker-git-deploy' /etc/systemd/system/docker-git-deploy.service
          sudo grep -qx 'WorkingDirectory=/opt/host-deploy' /etc/systemd/system/docker-git-deploy.service
          sudo grep -qx 'OnUnitInactiveSec=7min' /etc/systemd/system/docker-git-deploy.timer

      - name: Show config and timers
        run: |
          sudo cat /etc/docker-git-deploy/config
          systemctl list-timers docker-git-deploy.timer || true

      - name: Provide .env on the host
        run: |
          sudo cp /opt/host-deploy/.env.example /opt/host-deploy/.env
          sudo chown docker-git-deploy:docker-git-deploy /opt/host-deploy/.env

      - name: Deploy and wait for health
        run: sudo /usr/local/bin/docker-git-deploy deploy --force

      - name: Assert autoheal container is running
        run: |
          sudo docker ps --filter name=autoheal --format '{{.Names}} {{.Status}}'
          test "$(sudo docker inspect -f '{{.State.Running}}' autoheal)" = "true"

      - name: Trigger the systemd deploy path (unprivileged user, best-effort)
        run: |
          sudo systemctl start docker-git-deploy.service || true
          echo "service result: $(sudo systemctl show -p Result --value docker-git-deploy.service)"
          sudo journalctl -u docker-git-deploy.service --no-pager | tail -40
