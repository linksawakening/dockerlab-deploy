name: Validate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate shell scripts
        run: |
          for script in scripts/*.sh; do
            bash -n "$script"
          done
          bash -n docker-git-deploy 2>/dev/null || true
      - name: Validate compose syntax
        run: |
          docker compose config
        env:
          EXAMPLE_IMAGE: nginx:alpine
          EXAMPLE_PORT: 8080
          EXAMPLE_FOO: default
